name: Contract CI

on:
  push:
    branches: [main, dev]
    paths:
      - "contracts/**"
      - "Cargo.toml"
      - ".github/workflows/contract.yml"
  pull_request:
    branches: [main]
    paths:
      - "contracts/**"
      - "Cargo.toml"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Job 1: Format check ──────────────────────────────────────────
  fmt:
    name: Rust Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Job 2: Clippy lint ───────────────────────────────────────────
  clippy:
    name: Clippy Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Clippy (deny all warnings)
        run: |
          cargo clippy --all-targets --features testutils -- \
            -D warnings \
            -D clippy::arithmetic_side_effects \
            -D clippy::integer_division \
            -D clippy::unwrap_used \
            -D clippy::expect_used \
            -D clippy::panic \
            -D clippy::indexing_slicing \
            -D clippy::wildcard_imports \
            -D clippy::cast_possible_truncation \
            -D clippy::cast_sign_loss \
            -D clippy::cast_precision_loss

  # ── Job 3: Unit tests ────────────────────────────────────────────
  test:
    name: Contract Unit Tests
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Run contract tests
        run: cargo test --features testutils -- --nocapture

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-results
          path: target/

  # ── Job 4: WASM build ────────────────────────────────────────────
  build:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release WASM
        run: |
          cargo build \
            --target wasm32-unknown-unknown \
            --release \
            --package stellarflow

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: stellarflow-wasm
          path: target/wasm32-unknown-unknown/release/stellarflow.wasm
          retention-days: 7